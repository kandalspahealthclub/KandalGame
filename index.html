<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kandal Gym: Lightweight Edition</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <link rel="icon" type="image/png" href="icon_kandal.png">
    <link rel="apple-touch-icon" href="icon_kandal.png">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #222 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; color: #fff; }
        #menu-logo { width: 180px; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.5)); }
        .btn-kandal { background: #fff; color: #000; border: none; border-radius: 10px; padding: 18px 45px; font-size: 22px; cursor: pointer; font-family: 'Anton'; text-transform: uppercase; width: 270px; margin-bottom: 15px; }
        #ui { position: absolute; top: 50px; left: 20px; z-index: 50; display: none; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #score { font-family: 'Anton'; font-size: 45px; color: #111; line-height: 1; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff416c, #ff4b2b); transition: width 0.3s; }
        #evo-msg { position: absolute; width: 100%; top: 35%; text-align: center; font-family: 'Anton'; font-size: 45px; color: #ffae00; display: none; z-index: 100; text-shadow: 3px 3px 0 #000; pointer-events: none; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 110; }
        canvas { display: block; background: #fff; }
    </style>
</head>
<body>

<div id="start-screen">
    <img src="logo_kandal.png" id="menu-logo">
    <button class="btn-kandal" onclick="iniciarJogo()">PUXAR FERRO</button>
    <p style="color:#666; font-size:12px; font-weight:bold; letter-spacing:1px;">LIGHTWEIGHT BABY!</p>
</div>

<div id="ui">
    <div style="font-size:10px; font-weight:900; color:#555; text-transform:uppercase;">Energia</div>
    <div style="width:150px; height:10px; background:#ddd; border-radius:10px; overflow:hidden; margin: 5px 0;">
        <div id="hp-bar"></div>
    </div>
    <div id="score">0</div>
</div>

<div id="evo-msg">EVOLUÇÃO!</div>

<div id="game-over">
    <h2 style="font-family:'Anton'; font-size:50px; color:#d00; margin:0;">FALHA TOTAL</h2>
    <p id="final-score-txt" style="font-size:24px; font-weight:800; margin: 20px 0;">0 PTS</p>
    <button class="btn-kandal" style="background:#000; color:#fff;" onclick="iniciarJogo()">REPETIR TREINO</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startScreen = document.getElementById("start-screen");
const ui = document.getElementById("ui");
const gameOverScreen = document.getElementById("game-over");
const evoMsg = document.getElementById("evo-msg");

let jogoIniciado = false;
let jogador, score, obstaculos, touchX, transformando, lastMilestone = 0, lastTime = 0, shake = 0;

// --- MOTOR DE ÁUDIO ÚNICO ---
const somRonnie = new Audio('lightweight.mp3');

function tocarSom() {
    somRonnie.currentTime = 0; // Reinicia o som se já estiver a tocar
    somRonnie.play().catch(e => console.log("Áudio bloqueado pelo navegador"));
}

const imagens = {};
const comida = ['chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
const herois = ['boneco_magro', 'boneco_musculado', 'cbum', 'ronnie', 'arnaldo'];

comida.forEach(n => { imagens[n] = new Image(); imagens[n].src = n + '.png'; });
herois.forEach(n => { imagens[n] = new Image(); imagens[n].src = n + '.png'; imagens[n].onerror = function() { if(!this.src.includes('.jpg')) this.src = n + '.jpg'; }; });

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

function iniciarJogo() {
    somRonnie.load(); // Pré-carregamento por segurança
    jogador = { w: 75, h: 115, x: canvas.width/2 - 37, y: canvas.height-170, speed: 520, hp: 100, nivel: 'boneco_magro' };
    score = 0; lastMilestone = 0; obstaculos = []; touchX = null; transformando = false; jogoIniciado = true;
    lastTime = performance.now();
    document.getElementById("hp-bar").style.width = "100%";
    document.getElementById("score").innerText = "0";
    startScreen.style.display = "none";
    gameOverScreen.style.display = "none";
    ui.style.display = "block";
}

window.ontouchstart = (e) => touchX = e.touches[0].clientX;
window.ontouchmove = (e) => touchX = e.touches[0].clientX;
window.ontouchend = () => touchX = null;

class Obj {
    constructor() {
        this.n = comida[Math.floor(Math.random() * comida.length)];
        this.bom = ['proteina', 'legumes', 'energetico'].includes(this.n);
        this.s = 65; this.x = Math.random() * (canvas.width - this.s); this.y = -this.s;
        this.v = (320 + (score / 4)); 
    }
    draw(dt) {
        const img = imagens[this.n];
        if (img && img.complete) ctx.drawImage(img, this.x, this.y, this.s, this.s);
        if (!transformando) this.y += this.v * dt;
    }
}

function dispararEvolucao(msg, nivel, vel) {
    transformando = true; shake = 80;
    tocarSom(); // Grita na evolução!
    evoMsg.innerText = msg; evoMsg.style.display = "block";
    canvas.style.filter = "brightness(2) contrast(1.2)";
    setTimeout(() => {
        jogador.nivel = nivel; jogador.speed = vel;
        jogador.w = 110; jogador.h = 175; jogador.y = canvas.height - 230;
        transformando = false; evoMsg.style.display = "none";
        canvas.style.filter = "none";
    }, 1200);
}

function loop(currentTime) {
    const dt = (currentTime - lastTime) / 1000;
    lastTime = currentTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height); 

    if (jogoIniciado) {
        if (shake > 0) { ctx.save(); ctx.translate(Math.random()*10-5, Math.random()*10-5); shake--; }

        if (touchX !== null) {
            let centro = jogador.x + jogador.w / 2;
            let dist = touchX - centro;
            if (Math.abs(dist) > 5) jogador.x += (dist > 0 ? 1 : -1) * jogador.speed * dt;
        }
        if (jogador.x < 0) jogador.x = 0;
        if (jogador.x > canvas.width - jogador.w) jogador.x = canvas.width - jogador.w;

        // LÓGICA DO GRITO (A CADA 300 PONTOS)
        if (score > 0 && score >= lastMilestone + 300) {
            tocarSom();
            lastMilestone = score;
        }

        // EVOLUÇÕES
        if (score >= 1000 && score < 2000 && jogador.nivel === 'boneco_magro') dispararEvolucao("MONSTRO KANDAL!", "boneco_musculado", 560);
        else if (score >= 2000 && score < 4000 && jogador.nivel === 'boneco_musculado') dispararEvolucao("CBUM ATIVADO!", "cbum", 620);
        else if (score >= 4000 && score < 6000 && jogador.nivel === 'cbum') dispararEvolucao("LIGHTWEIGHT BABY!", "ronnie", 680);

        const imgP = imagens[jogador.nivel];
        if (imgP && imgP.complete) ctx.drawImage(imgP, jogador.x, jogador.y, jogador.w, jogador.h);
        
        if (Math.random() < 0.04 && !transformando) obstaculos.push(new Obj());
        
        for (let i = obstaculos.length - 1; i >= 0; i--) {
            const o = obstaculos[i]; o.draw(dt);
            if (jogador.x + 15 < o.x + o.s - 15 && jogador.x + jogador.w - 15 > o.x + 15 && 
                jogador.y + 15 < o.y + o.s - 15 && jogador.y + jogador.h - 15 > o.y + 15) {
                if (o.bom) { score += 100; jogador.hp = Math.min(100, jogador.hp + 5); }
                else { jogador.hp -= 22; shake = 15; }
                document.getElementById("hp-bar").style.width = Math.max(0, jogador.hp) + "%";
                document.getElementById("score").innerText = score;
                obstaculos.splice(i, 1);
            } else if (o.y > canvas.height) { obstaculos.splice(i, 1); }
        }
        if (jogador.hp <= 0) { jogoIniciado = false; gameOverScreen.style.display = "flex"; }
        if (shake > 0) ctx.restore();
    }
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
