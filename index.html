<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kandal Gym: Stable Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #eee; font-family: 'Anton', sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        #menu-logo { width: 180px; height: auto; margin-bottom: 10px; }
        #rules-box { background: #fdfdfd; border: 2px dashed #000; padding: 12px; margin: 10px 0; width: 260px; font-family: sans-serif; font-size: 13px; }
        .btn-kandal { background: #000; color: #fff; border: none; padding: 15px 40px; font-size: 20px; cursor: pointer; text-transform: uppercase; box-shadow: 4px 4px 0px #d00; margin-bottom: 8px; width: 240px; }
        .btn-outline { background: #fff; color: #000; border: 3px solid #000; box-shadow: 4px 4px 0px #ccc; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 50; display: none; pointer-events: none; }
        .bar-outer { width: 140px; height: 12px; background: #222; border: 3px solid #000; }
        #hp-bar { width: 100%; height: 100%; background: #d00; transition: width 0.2s; }
        #score { font-size: 35px; color: #000; margin-top: 5px; }
        #trans-msg { position: absolute; width: 100%; top: 35%; text-align: center; font-size: 40px; color: #ffae00; text-shadow: 2px 2px 0px #000; display: none; z-index: 60; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="start-screen">
    <img src="logo_kandal.png" id="menu-logo" alt="Kandal Gym Logo">
    <div id="rules-box">
        <h4>REGRAS DO TREINO:</h4>
        <ul style="padding-left: 18px; margin: 0;">
            <li>🥗 <b>BOM:</b> Proteína/Legumes dão +100 pts e Vida.</li>
            <li>🍔 <b>MAU:</b> Fast food retira muita Vida!</li>
            <li>⚡ <b>EVOLUÇÃO:</b> Aos 1000 pts viras um Monstro.</li>
        </ul>
    </div>
    <button class="btn-kandal" onclick="iniciarJogo()">INICIAR TREINO</button>
    <div id="high-scores" style="width:200px; border:2px solid #000; padding:8px; text-align:center;">
        <h3 style="margin:0; color:#d00; font-size: 16px;">RECORDES</h3>
        <div id="scores-list"></div>
    </div>
</div>

<div id="ui">
    <div class="bar-outer"><div id="hp-bar"></div></div>
    <div id="score">0</div>
</div>

<div id="trans-msg">ESTÁS UM MONSTRO!</div>

<div id="game-over">
    <h2 style="font-size:35px; color:#d00; margin:0;">FALHA MUSCULAR</h2>
    <p id="final-score-txt" style="font-size:22px; margin: 8px 0;">PONTOS: 0</p>
    <button class="btn-kandal" onclick="iniciarJogo()">RECOMEÇAR</button>
    <button class="btn-kandal btn-outline" onclick="voltarAoMenu()">SAIR PARA O MENU</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startScreen = document.getElementById("start-screen");
const ui = document.getElementById("ui");
const gameOverScreen = document.getElementById("game-over");

let jogoIniciado = false;
let jogador, score, obstaculos, touchX, transformando, shake = 0;
let lastTime = 0; // Para o Delta Time

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

const imagens = {};
const nomes = ['boneco_magro', 'boneco_musculado', 'chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
nomes.forEach(n => { imagens[n] = new Image(); imagens[n].src = n + '.png?v=13'; });

function atualizarTabela() {
    let records = JSON.parse(localStorage.getItem('kandal_top')) || [0, 0, 0];
    document.getElementById("scores-list").innerHTML = records.map((s, i) => `
        <div style="display:flex; justify-content:space-between; font-size:14px; padding:2px 0;"><span>${i+1}º</span> <span>${s} pts</span></div>
    `).join('');
}

function salvarRecorde(s) {
    let r = JSON.parse(localStorage.getItem('kandal_top')) || [0, 0, 0];
    r.push(s); r.sort((a,b) => b-a);
    localStorage.setItem('kandal_top', JSON.stringify(r.slice(0, 3)));
}

function iniciarJogo() {
    jogador = { w: 65, h: 100, x: canvas.width/2 - 32, y: canvas.height-160, speed: 450, hp: 100, musculado: false };
    score = 0; obstaculos = []; touchX = null; transformando = false; jogoIniciado = true;
    lastTime = performance.now(); // Reset do tempo
    document.getElementById("hp-bar").style.width = "100%";
    document.getElementById("score").innerText = "0";
    startScreen.style.display = "none";
    gameOverScreen.style.display = "none";
    ui.style.display = "block";
    document.getElementById("trans-msg").style.display = "none";
}

function voltarAoMenu() {
    jogoIniciado = false;
    gameOverScreen.style.display = "none";
    ui.style.display = "none";
    startScreen.style.display = "flex";
    atualizarTabela();
}

window.ontouchstart = (e) => touchX = e.touches[0].clientX;
window.ontouchmove = (e) => touchX = e.touches[0].clientX;
window.ontouchend = () => touchX = null;

class Obj {
    constructor() {
        const tipos = ['chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
        this.n = tipos[Math.floor(Math.random() * tipos.length)];
        this.bom = ['proteina', 'legumes', 'energetico'].includes(this.n);
        this.s = 45;
        this.x = Math.random() * (canvas.width - this.s);
        this.y = -this.s;
        // Velocidade baseada em pixels por segundo
        this.v = (300 + Math.random() * 200 + (score / 5)); 
    }
    draw(dt) {
        const img = imagens[this.n];
        if (img.complete && img.naturalWidth > 0) ctx.drawImage(img, this.x, this.y, this.s, this.s);
        else { ctx.fillStyle = this.bom ? "green" : "red"; ctx.fillRect(this.x, this.y, this.s, this.s); }
        if (!transformando) this.y += this.v * dt;
    }
}

function loop(currentTime) {
    const dt = (currentTime - lastTime) / 1000; // Delta Time em segundos
    lastTime = currentTime;

    ctx.fillStyle = "#f8f8f8";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    if (jogoIniciado) {
        if (shake > 0) { ctx.save(); ctx.translate(Math.random()*6-3, Math.random()*6-3); shake--; }

        if (touchX !== null) {
            let centro = jogador.x + jogador.w / 2;
            if (touchX < centro - 10) jogador.x -= jogador.speed * dt;
            if (touchX > centro + 10) jogador.x += jogador.speed * dt;
        }
        
        if (jogador.x < 0) jogador.x = 0;
        if (jogador.x > canvas.width - jogador.w) jogador.x = canvas.width - jogador.w;

        if (score >= 1000 && !jogador.musculado) {
            transformando = true; document.getElementById("trans-msg").style.display = "block"; shake = 40;
            setTimeout(() => {
                jogador.musculado = true; jogador.w = 90; jogador.h = 145; 
                jogador.y = canvas.height - 200; jogador.speed = 550;
                transformando = false; document.getElementById("trans-msg").style.display = "none";
            }, 1200);
        }

        const imgP = imagens[jogador.musculado ? 'boneco_musculado' : 'boneco_magro'];
        if (imgP.complete && imgP.naturalWidth > 0) ctx.drawImage(imgP, jogador.x, jogador.y, jogador.w, jogador.h);
        else { ctx.fillStyle = "#000"; ctx.fillRect(jogador.x, jogador.y, jogador.w, jogador.h); }

        if (Math.random() < 0.035 && !transformando) obstaculos.push(new Obj());
        
        for (let i = obstaculos.length - 1; i >= 0; i--) {
            const o = obstaculos[i]; o.draw(dt);
            if (jogador.x + 10 < o.x + o.s - 10 && jogador.x + jogador.w - 10 > o.x + 10 && 
                jogador.y + 10 < o.y + o.s - 10 && jogador.y + jogador.h - 10 > o.y + 10) {
                if (o.bom) { score += 100; jogador.hp = Math.min(100, jogador.hp + 5); }
                else { jogador.hp -= 20; shake = 10; }
                document.getElementById("hp-bar").style.width = jogador.hp + "%";
                document.getElementById("score").innerText = score;
                obstaculos.splice(i, 1);
            } else if (o.y > canvas.height) { obstaculos.splice(i, 1); }
        }

        if (jogador.hp <= 0) {
            jogoIniciado = false; salvarRecorde(score); atualizarTabela();
            document.getElementById("final-score-txt").innerText = "PONTOS: " + score;
            gameOverScreen.style.display = "flex";
        }
        if (shake > 0) ctx.restore();
    }
    requestAnimationFrame(loop);
}
atualizarTabela();
requestAnimationFrame(loop);
</script>
</body>
</html>
