<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kandal Gym: Hardcore Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; font-family: 'Anton', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 40px; left: 20px; pointer-events: none; z-index: 50; }
        .bar-outer { 
            width: 250px; height: 30px; background: #222; 
            border: 5px solid #000; box-shadow: 6px 6px 0px rgba(0,0,0,0.1); 
        }
        #hp-bar { width: 100%; height: 100%; background: #d00; transition: width 0.2s; }
        #score { font-size: 70px; color: #000; margin-top: 10px; letter-spacing: -3px; line-height: 0.7; }

        #blood-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 40; opacity: 0;
            box-shadow: inset 0 0 150px rgba(200, 0, 0, 0.9);
            transition: opacity 0.4s;
        }

        /* Ecrã de Game Over / Respawn */
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }
        #restart-btn {
            background: #000; color: #fff; border: none; padding: 20px 40px;
            font-family: 'Anton', sans-serif; font-size: 25px; margin-top: 20px;
            box-shadow: 6px 6px 0px #d00;
        }

        /* Mensagem de Transformação */
        #trans-msg {
            position: absolute; width: 100%; top: 40%; text-align: center;
            font-size: 60px; color: #ffae00; text-shadow: 4px 4px 0px #000;
            display: none; z-index: 60;
        }
    </style>
</head>
<body>

<div id="blood-overlay"></div>
<div id="trans-msg">EVOLUÇÃO KANDAL!</div>

<div id="ui">
    <div class="bar-outer"><div id="hp-bar"></div></div>
    <div id="score">0</div>
</div>

<div id="game-over">
    <h2 style="font-size:60px; color:#d00; margin:0;">FALHA MUSCULAR</h2>
    <p style="font-size:30px; margin:5px 0;">SCORE: <span id="final-score">0</span></p>
    <p style="font-size:30px; color:#daa520;">RECORD: <span id="best-score">0</span></p>
    <button id="restart-btn">RECOMEÇAR TREINO</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const hpBar = document.getElementById("hp-bar");
const scoreTxt = document.getElementById("score");
const bloodOverlay = document.getElementById("blood-overlay");
const gameOverScreen = document.getElementById("game-over");
const transMsg = document.getElementById("trans-msg");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- CARREGAMENTO DE IMAGENS ---
const imagens = {};
const nomes = ['boneco_magro', 'boneco_musculado', 'chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico', 'logo_kandal'];

nomes.forEach(n => {
    imagens[n] = new Image();
    imagens[n].src = n + '.png?v=1'; // Força atualização do GitHub
});

let jogador, score, spawnTimer, shakeTimer, obstaculos, touchX, gameActive, transformando;

function init() {
    jogador = {
        w: 90, h: 140,
        x: window.innerWidth / 2 - 45,
        y: window.innerHeight - 220,
        speed: 15, hp: 100, musculado: false
    };
    score = 0;
    spawnTimer = 0;
    shakeTimer = 0;
    obstaculos = [];
    touchX = null;
    gameActive = true;
    transformando = false;
    
    gameOverScreen.style.display = "none";
    transMsg.style.display = "none";
    hpBar.style.width = "100%";
    scoreTxt.innerText = "0";
}

window.ontouchstart = (e) => touchX = e.touches[0].clientX;
window.ontouchmove = (e) => touchX = e.touches[0].clientX;
window.ontouchend = () => touchX = null;

class Objeto {
    constructor() {
        const tipos = ['chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
        this.nome = tipos[Math.floor(Math.random() * tipos.length)];
        this.tipo = ['proteina', 'legumes', 'energetico'].includes(this.nome) ? 'bom' : 'mau';
        this.size = 85;
        this.x = Math.random() * (window.innerWidth - this.size);
        this.y = -this.size;
        this.vel = 6 + Math.random() * 5 + (score / 1200);
        this.rot = Math.random() * Math.PI * 2;
    }
    update() { if(!transformando) this.y += this.vel; this.rot += 0.04; }
    draw() {
        const img = imagens[this.nome];
        ctx.save();
        ctx.translate(this.x + this.size/2, this.y + this.size/2);
        ctx.rotate(this.rot);
        if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, -this.size/2, -this.size/2, this.size, this.size);
        } else {
            ctx.fillStyle = this.tipo === 'bom' ? '#22c55e' : '#ef4444';
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        }
        ctx.restore();
    }
}

function update() {
    if (!gameActive || transformando) return;

    if (touchX !== null) {
        let centro = jogador.x + jogador.w / 2;
        if (touchX < centro - 15) jogador.x -= jogador.speed;
        else if (touchX > centro + 15) jogador.x += jogador.speed;
    }
    if (jogador.x < 0) jogador.x = 0;
    if (jogador.x + jogador.w > window.innerWidth) jogador.x = window.innerWidth - jogador.w;

    // --- LÓGICA DE TRANSFORMAÇÃO ---
    if (score >= 300 && !jogador.musculado) {
        transformando = true;
        shakeTimer = 50;
        transMsg.style.display = "block";
        setTimeout(() => {
            jogador.musculado = true;
            jogador.w = 130; jogador.h = 190;
            jogador.speed = 18;
            transformando = false;
            transMsg.style.display = "none";
        }, 1500);
    }

    bloodOverlay.style.opacity = jogador.hp < 30 ? (1 - jogador.hp / 30) : 0;

    spawnTimer++;
    if (spawnTimer > 30) { obstaculos.push(new Objeto()); spawnTimer = 0; }

    for (let i = obstaculos.length - 1; i >= 0; i--) {
        const o = obstaculos[i]; o.update();
        if (jogador.x < o.x + o.size - 20 && jogador.x + jogador.w > o.x + 20 && 
            jogador.y < o.y + o.size - 20 && jogador.y + jogador.h > o.y + 20) {
            if (o.tipo === 'bom') { score += 100; jogador.hp = Math.min(100, jogador.hp + 8); }
            else { jogador.hp -= 20; shakeTimer = 12; }
            hpBar.style.width = jogador.hp + "%";
            obstaculos.splice(i, 1);
        } else if (o.y > window.innerHeight) { obstaculos.splice(i, 1); }
    }
    
    if (jogador.hp <= 0) {
        gameActive = false;
        const record = localStorage.getItem('kandal_record') || 0;
        if (score > record) localStorage.setItem('kandal_record', score);
        document.getElementById("final-score").innerText = score;
        document.getElementById("best-score").innerText = localStorage.getItem('kandal_record');
        gameOverScreen.style.display = "flex";
    }
    scoreTxt.innerText = score;
    if (shakeTimer > 0) shakeTimer--;
}

function draw() {
    ctx.save();
    if (shakeTimer > 0) ctx.translate(Math.random() * 8 - 4, Math.random() * 8 - 4);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (imagens['logo_kandal'] && imagens['logo_kandal'].complete) {
        ctx.globalAlpha = 0.05;
        ctx.drawImage(imagens['logo_kandal'], window.innerWidth/2 - 200, window.innerHeight/2 - 200, 400, 400);
        ctx.globalAlpha = 1.0;
    }

    ctx.fillStyle = "#111"; ctx.fillRect(0, window.innerHeight - 60, window.innerWidth, 60);
    ctx.strokeStyle = "#38bdf8"; ctx.lineWidth = 5; ctx.strokeRect(0, window.innerHeight - 60, window.innerWidth, 3);

    // Boneco (Muda conforme evolução)
    const imgNome = jogador.musculado ? 'boneco_musculado' : 'boneco_magro';
    const imgP = imagens[imgNome];

    if (imgP && imgP.complete && imgP.naturalWidth > 0) {
        ctx.drawImage(imgP, jogador.x, jogador.y, jogador.w, jogador.h);
    } else {
        ctx.fillStyle = jogador.musculado ? "#000" : "#333";
        ctx.fillRect(jogador.x, jogador.y, jogador.w, jogador.h);
    }

    obstaculos.forEach(o => o.draw());
    ctx.restore();
    requestAnimationFrame(() => { update(); draw(); });
}

document.getElementById("restart-btn").onclick = () => init();

init();
draw();
</script>
</body>
</html>
