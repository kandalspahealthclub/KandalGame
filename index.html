<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kandal Gym: Hardcore Nutrition</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #fdfdfd; 
            font-family: 'Anton', sans-serif; 
            touch-action: none; 
        }
        canvas { display: block; }
        
        /* UI Rude & Premium */
        #ui { position: absolute; top: 40px; left: 40px; pointer-events: none; z-index: 50; }
        .vida-label { color: #111; font-size: 16px; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; }
        .bar-outer { 
            width: 300px; height: 32px; background: #222; 
            border: 5px solid #000; box-shadow: 8px 8px 0px rgba(0,0,0,0.1); 
            position: relative; overflow: hidden;
        }
        #hp-bar { width: 100%; height: 100%; background: #d00; transition: width 0.2s; }
        #score { font-size: 90px; color: #000; margin-top: 15px; letter-spacing: -4px; line-height: 0.7; }

        /* Efeito de Sangue (Esforço Extremo) */
        #blood-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 40;
            box-shadow: inset 0 0 100px rgba(200, 0, 0, 0);
            transition: box-shadow 0.5s;
        }
        @keyframes pulse-blood {
            0% { box-shadow: inset 0 0 150px rgba(200, 0, 0, 0.6); }
            100% { box-shadow: inset 0 0 250px rgba(200, 0, 0, 0.9); }
        }
    </style>
</head>
<body>

<div id="blood-overlay"></div>
<div id="ui">
    <div class="vida-label">POTÊNCIA KANDAL</div>
    <div class="bar-outer"><div id="hp-bar"></div></div>
    <div id="score">0</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const hpBar = document.getElementById("hp-bar");
const scoreTxt = document.getElementById("score");
const bloodOverlay = document.getElementById("blood-overlay");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- IMAGENS ---
const imagens = {};
const nomesImagens = ['boneco_musculado', 'chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico', 'logo_kandal'];

let carregadas = 0;
nomesImagens.forEach(nome => {
    imagens[nome] = new Image();
    imagens[nome].src = nome + '.png';
    imagens[nome].onload = () => carregadas++;
    imagens[nome].onerror = () => carregadas++;
});

// Setup Jogador
const jogador = {
    w: 130, h: 190,
    x: window.innerWidth / 2 - 65,
    y: window.innerHeight - 260,
    speed: 15, hp: 100
};

let score = 0;
let spawnTimer = 0;
let shakeTimer = 0;
const obstaculos = [];
const keys = {};

window.onkeydown = (e) => keys[e.key] = true;
window.onkeyup = (e) => keys[e.key] = false;

// Touch Lados
let touchDir = 0;
window.ontouchstart = (e) => touchDir = e.touches[0].clientX < window.innerWidth/2 ? -1 : 1;
window.ontouchend = () => touchDir = 0;

class Objeto {
    constructor() {
        const tipos = ['chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
        this.nome = tipos[Math.floor(Math.random() * tipos.length)];
        this.tipo = ['proteina', 'legumes', 'energetico'].includes(this.nome) ? 'bom' : 'mau';
        this.size = 85;
        this.x = Math.random() * (window.innerWidth - this.size);
        this.y = -this.size;
        this.vel = 6 + Math.random() * 6 + (score / 1500);
        this.rot = Math.random() * 360; // Rotação para não parecer estático
    }

    update() { this.y += this.vel; this.rot += 2; }

    draw() {
        const img = imagens[this.nome];
        ctx.save();
        ctx.translate(this.x + this.size/2, this.y + this.size/2);
        ctx.rotate(this.rot * Math.PI / 180);
        
        ctx.shadowColor = "rgba(0,0,0,0.2)";
        ctx.shadowBlur = 15;
        ctx.shadowOffsetY = 10;

        if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, -this.size/2, -this.size/2, this.size, this.size);
        } else {
            ctx.fillStyle = this.tipo === 'bom' ? '#000' : '#d00';
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        }
        ctx.restore();
    }
}

function update() {
    // Movimento Rude e Rápido
    if (keys["ArrowLeft"] || touchDir === -1) jogador.x -= jogador.speed;
    if (keys["ArrowRight"] || touchDir === 1) jogador.x += jogador.speed;
    if (jogador.x < 0) jogador.x = 0;
    if (jogador.x + jogador.w > window.innerWidth) jogador.x = window.innerWidth - jogador.w;

    // Gestão de HP e Efeitos
    if (jogador.hp < 25) {
        bloodOverlay.style.animation = "pulse-blood 0.4s infinite alternate";
    } else {
        bloodOverlay.style.animation = "none";
        bloodOverlay.style.boxShadow = "none";
    }

    spawnTimer++;
    if (spawnTimer > 30) {
        obstaculos.push(new Objeto());
        spawnTimer = 0;
    }

    for (let i = obstaculos.length - 1; i >= 0; i--) {
        const o = obstaculos[i];
        o.update();

        // Colisão com tolerância (hitbox rude)
        if (jogador.x < o.x + o.size - 20 && jogador.x + jogador.w > o.x + 20 && 
            jogador.y < o.y + o.size - 20 && jogador.y + jogador.h > o.y + 20) {
            
            if (o.tipo === 'bom') {
                score += 100;
                jogador.hp = Math.min(100, jogador.hp + 10);
            } else {
                jogador.hp -= 20;
                shakeTimer = 10; // Ecrã treme
            }
            hpBar.style.width = jogador.hp + "%";
            obstaculos.splice(i, 1);
        } else if (o.y > window.innerHeight) {
            obstaculos.splice(i, 1);
        }
    }

    if (jogador.hp <= 0) {
        alert("FALHA MUSCULAR! SCORE: " + score);
        location.reload();
    }
    scoreTxt.innerText = score;
    if (shakeTimer > 0) shakeTimer--;
}

function draw() {
    ctx.save();
    if (shakeTimer > 0) ctx.translate(Math.random() * 10 - 5, Math.random() * 10 - 5);
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // LOGO KANDAL MARCA DE ÁGUA
    if (imagens['logo_kandal'] && imagens['logo_kandal'].complete) {
        ctx.globalAlpha = 0.04;
        const lSize = 500;
        ctx.drawImage(imagens['logo_kandal'], window.innerWidth/2 - lSize/2, window.innerHeight/2 - lSize/2, lSize, lSize);
        ctx.globalAlpha = 1.0;
    }

    // Chão de Borracha Pesada
    ctx.fillStyle = "#111";
    ctx.fillRect(0, window.innerHeight - 70, window.innerWidth, 70);
    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 5;
    ctx.strokeRect(0, window.innerHeight - 70, window.innerWidth, 3);

    // Jogador Musculado
    const imgPlayer = imagens['boneco_musculado'];
    if (imgPlayer && imgPlayer.complete && imgPlayer.naturalWidth > 0) {
        ctx.drawImage(imgPlayer, jogador.x, jogador.y, jogador.w, jogador.h);
    } else {
        ctx.fillStyle = "#222";
        ctx.fillRect(jogador.x, jogador.y, jogador.w, jogador.h);
    }

    obstaculos.forEach(o => o.draw());
    ctx.restore();

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>
