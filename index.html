<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kandal Gym: Dragon Ball Evolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; font-family: 'Anton', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 30px; left: 20px; z-index: 50; pointer-events: none; }
        .bar-outer { width: 220px; height: 25px; background: #222; border: 4px solid #000; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); }
        #hp-bar { width: 100%; height: 100%; background: #d00; transition: width 0.2s; }
        #score-display { font-size: 60px; color: #000; margin-top: 5px; letter-spacing: -2px; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        #restart-btn { background: #000; color: #fff; border: none; padding: 20px 40px; font-family: 'Anton'; font-size: 25px; margin-top: 20px; box-shadow: 4px 4px 0 #d00; cursor: pointer; }
        #trans-msg { position: absolute; width: 100%; text-align: center; top: 40%; font-size: 60px; color: #ffae00; display: none; z-index: 60; text-shadow: 3px 3px 0 #000; font-style: italic; }
    </style>
</head>
<body>

<div id="trans-msg">EVOLUÇÃO KANDAL!</div>
<div id="ui">
    <div class="bar-outer"><div id="hp-bar"></div></div>
    <div id="score-display">0</div>
</div>

<div id="game-over">
    <h2 style="font-size:60px; color:#d00; margin:0;">FALHA MUSCULAR</h2>
    <p style="font-size:30px; margin:10px 0;">SCORE: <span id="final-score">0</span></p>
    <button id="restart-btn">RECOMEÇAR TREINO</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const hpBar = document.getElementById("hp-bar");
const scoreDisplay = document.getElementById("score-display");
const gameOverScreen = document.getElementById("game-over");
const transMsg = document.getElementById("trans-msg");
const restartBtn = document.getElementById("restart-btn");

function resize() { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize);
resize();

// --- CARREGAMENTO DE IMAGENS ---
const imagens = {};
const nomes = ['boneco_magro', 'boneco_musculado', 'chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico', 'logo_kandal'];
nomes.forEach(n => { 
    imagens[n] = new Image(); 
    imagens[n].src = n + '.png?v=' + Date.now(); 
});

let jogador, score, spawnTimer, obstaculos, touchX, gameActive, transformando, shakeTimer;

function init() {
    jogador = { w: 90, h: 140, x: window.innerWidth / 2 - 45, y: window.innerHeight - 220, speed: 14, hp: 100, musculado: false };
    score = 0; spawnTimer = 0; shakeTimer = 0; obstaculos = []; touchX = null; gameActive = true; transformando = false;
    gameOverScreen.style.display = "none";
    transMsg.style.display = "none";
    hpBar.style.width = "100%";
}

window.ontouchstart = (e) => touchX = e.touches[0].clientX;
window.ontouchmove = (e) => touchX = e.touches[0].clientX;
window.ontouchend = () => touchX = null;

class Objeto {
    constructor() {
        const tipos = ['chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
        this.nome = tipos[Math.floor(Math.random() * tipos.length)];
        this.tipo = ['proteina', 'legumes', 'energetico'].includes(this.nome) ? 'bom' : 'mau';
        this.size = 75;
        this.x = Math.random() * (window.innerWidth - this.size);
        this.y = -this.size;
        this.vel = 5 + Math.random() * 5 + (score / 1500);
        this.rot = Math.random() * Math.PI * 2;
    }
    update() { if(!transformando) this.y += this.vel; this.rot += 0.04; }
    draw() {
        const img = imagens[this.nome];
        ctx.save();
        ctx.translate(this.x + this.size/2, this.y + this.size/2);
        ctx.rotate(this.rot);
        if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, -this.size/2, -this.size/2, this.size, this.size);
        } else {
            ctx.fillStyle = this.tipo === 'bom' ? '#2ecc71' : '#e74c3c';
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
        }
        ctx.restore();
    }
}

function dispararTransformacao() {
    transformando = true;
    shakeTimer = 60; 
    transMsg.style.display = "block";
    
    setTimeout(() => {
        jogador.musculado = true;
        jogador.w = 130; jogador.h = 190;
        jogador.speed = 18; // Super velocidade
        transformando = false;
        transMsg.style.display = "none";
    }, 1500);
}

function update() {
    if (!gameActive || transformando) return;
    if (touchX !== null) {
        let centro = jogador.x + jogador.w / 2;
        if (touchX < centro - 15) jogador.x -= jogador.speed;
        else if (touchX > centro + 15) jogador.x += jogador.speed;
    }
    if (jogador.x < 0) jogador.x = 0;
    if (jogador.x + jogador.w > window.innerWidth) jogador.x = window.innerWidth - jogador.w;

    if (score >= 500 && !jogador.musculado) dispararTransformacao();

    spawnTimer++;
    if (spawnTimer > 35) { obstaculos.push(new Objeto()); spawnTimer = 0; }

    for (let i = obstaculos.length - 1; i >= 0; i--) {
        const o = obstaculos[i]; o.update();
        if (jogador.x < o.x + o.size - 20 && jogador.x + jogador.w > o.x + 20 && 
            jogador.y < o.y + o.size - 20 && jogador.y + jogador.h > o.y + 20) {
            if (o.tipo === 'bom') { score += 100; jogador.hp = Math.min(100, jogador.hp + 5); }
            else { jogador.hp -= 20; shakeTimer = 10; }
            hpBar.style.width = jogador.hp + "%";
            obstaculos.splice(i, 1);
        } else if (o.y > window.innerHeight) { obstaculos.splice(i, 1); }
    }
    if (jogador.hp <= 0) { gameActive = false; document.getElementById("final-score").innerText = score; gameOverScreen.style.display = "flex"; }
    scoreDisplay.innerText = score;
    if (shakeTimer > 0) shakeTimer--;
}

function draw() {
    ctx.save();
    if (shakeTimer > 0) ctx.translate(Math.random() * 10 - 5, Math.random() * 10 - 5);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Aura de Transformação
    if (transformando) {
        ctx.shadowBlur = 30; ctx.shadowColor = "#ffae00";
        ctx.fillStyle = "rgba(255, 174, 0, 0.3)";
        ctx.beginPath();
        ctx.arc(jogador.x + jogador.w/2, jogador.y + jogador.h/2, 100, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    const imgP = jogador.musculado ? imagens['boneco_musculado'] : imagens['boneco_magro'];
    if (imgP && imgP.complete && imgP.naturalWidth > 0) {
        ctx.drawImage(imgP, jogador.x, jogador.y, jogador.w, jogador.h);
    } else {
        ctx.fillStyle = jogador.musculado ? "#111" : "#888";
        ctx.fillRect(jogador.x, jogador.y, jogador.w, jogador.h);
    }
    
    obstaculos.forEach(o => o.draw());
    ctx.restore();
    requestAnimationFrame(() => { update(); draw(); });
}

restartBtn.onclick = () => init();
init();
draw();
</script>
</body>
</html>
