<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kandal Gym: Modern & Rules</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #ffffff; font-family: 'Inter', sans-serif; touch-action: none; }
        
        /* MENU INICIAL MODERNO COM REGRAS */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #222 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; color: #fff;
        }
        #menu-logo { width: 190px; height: auto; margin-bottom: 5px; filter: drop-shadow(0 0 10px rgba(221, 0, 0, 0.4)); }

        /* Bloco de Regras Modernizado */
        #rules-box {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0; width: 270px; font-size: 13px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #rules-box h4 { margin: 0 0 8px 0; font-family: 'Anton'; color: #ff416c; text-transform: uppercase; letter-spacing: 1px; }
        #rules-box ul { padding-left: 18px; margin: 0; color: #ddd; list-style-type: none; }
        #rules-box li { margin-bottom: 5px; position: relative; }
        #rules-box li::before { content: "•"; color: #ff416c; font-weight: bold; display: inline-block; width: 1em; margin-left: -1em; }

        .btn-kandal {
            background: #fff; color: #000; border: none; border-radius: 8px;
            padding: 16px 40px; font-size: 20px; cursor: pointer; text-transform: uppercase;
            font-family: 'Anton'; letter-spacing: 1px; margin-bottom: 10px; width: 260px;
            transition: transform 0.1s;
        }
        .btn-kandal:active { transform: scale(0.96); }
        .btn-outline { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.2); }

        /* UI DO JOGO */
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 50; display: none; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(8px);
            padding: 15px; border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .hp-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #555; margin-bottom: 6px; font-weight: 800; }
        .bar-outer { width: 160px; height: 10px; background: rgba(0,0,0,0.05); border-radius: 20px; overflow: hidden; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff416c, #ff4b2b); transition: width 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        #score { font-family: 'Anton', sans-serif; font-size: 45px; color: #111; margin-top: 5px; }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        canvas { display: block; background: #fff; }
    </style>
</head>
<body>

<div id="start-screen">
    <img src="logo_kandal.png" id="menu-logo" alt="Logo Kandal">
    
    <div id="rules-box">
        <h4>Manual do Atleta:</h4>
        <ul>
            <li><b>Dieta:</b> Proteína e Legumes curam e pontuam.</li>
            <li><b>Lixo:</b> Fast food destrói o teu progresso.</li>
            <li><b>Meta:</b> 1000 pontos para a Evolução Final.</li>
        </ul>
    </div>

    <button class="btn-kandal" onclick="iniciarJogo()">INICIAR TREINO</button>
    
    <div id="high-scores" style="color:rgba(255,255,255,0.5); font-size: 13px; text-align:center;">
        <div id="scores-list"></div>
    </div>
</div>

<div id="ui">
    <div class="hp-label">Energia Muscular</div>
    <div class="bar-outer"><div id="hp-bar"></div></div>
    <div id="score">0</div>
</div>

<div id="game-over">
    <h2 style="font-family:'Anton'; font-size:45px; color:#d00; margin:0;">FALHA TOTAL</h2>
    <p id="final-score-txt" style="font-size:24px; margin: 15px 0; font-weight:bold; color: #333;">0 PTS</p>
    <button class="btn-kandal" style="background:#000; color:#fff;" onclick="iniciarJogo()">REPETIR TREINO</button>
    <button class="btn-kandal btn-outline" style="color:#000; border-color:#000;" onclick="voltarAoMenu()">MENU PRINCIPAL</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startScreen = document.getElementById("start-screen");
const ui = document.getElementById("ui");
const gameOverScreen = document.getElementById("game-over");

let jogoIniciado = false;
let jogador, score, obstaculos, touchX, transformando, shake = 0, lastTime = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

const imagens = {};
const nomes = ['boneco_magro', 'boneco_musculado', 'chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
nomes.forEach(n => { imagens[n] = new Image(); imagens[n].src = n + '.png?v=17'; });

function atualizarTabela() {
    let records = JSON.parse(localStorage.getItem('kandal_top')) || [0, 0, 0];
    document.getElementById("scores-list").innerHTML = records.map((s, i) => `
        <div style="padding:1px;">${i+1}º Recorde: <b>${s}</b></div>
    `).join('');
}

function salvarRecorde(s) {
    let r = JSON.parse(localStorage.getItem('kandal_top')) || [0, 0, 0];
    r.push(s); r.sort((a,b) => b-a);
    localStorage.setItem('kandal_top', JSON.stringify(r.slice(0, 3)));
}

function iniciarJogo() {
    jogador = { w: 65, h: 100, x: canvas.width/2 - 32, y: canvas.height-160, speed: 500, hp: 100, musculado: false };
    score = 0; obstaculos = []; touchX = null; transformando = false; jogoIniciado = true;
    lastTime = performance.now();
    document.getElementById("hp-bar").style.width = "100%";
    document.getElementById("score").innerText = "0";
    startScreen.style.display = "none";
    gameOverScreen.style.display = "none";
    ui.style.display = "block";
}

function voltarAoMenu() {
    jogoIniciado = false;
    gameOverScreen.style.display = "none";
    ui.style.display = "none";
    startScreen.style.display = "flex";
    atualizarTabela();
}

window.ontouchstart = (e) => touchX = e.touches[0].clientX;
window.ontouchmove = (e) => touchX = e.touches[0].clientX;
window.ontouchend = () => touchX = null;

class Obj {
    constructor() {
        const tipos = ['chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
        this.n = tipos[Math.floor(Math.random() * tipos.length)];
        this.bom = ['proteina', 'legumes', 'energetico'].includes(this.n);
        this.s = 60;
        this.x = Math.random() * (canvas.width - this.s);
        this.y = -this.s;
        this.v = (320 + Math.random() * 180 + (score / 4)); 
    }
    draw(dt) {
        const img = imagens[this.n];
        if (img.complete && img.naturalWidth > 0) ctx.drawImage(img, this.x, this.y, this.s, this.s);
        else { ctx.fillStyle = this.bom ? "#4CAF50" : "#F44336"; ctx.fillRect(this.x, this.y, this.s, this.s); }
        if (!transformando) this.y += this.v * dt;
    }
}

function loop(currentTime) {
    const dt = (currentTime - lastTime) / 1000;
    lastTime = currentTime;

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.strokeStyle = "rgba(0,0,0,0.02)";
    for(let i=0; i<canvas.width; i+=60) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }

    if (jogoIniciado) {
        if (shake > 0) { ctx.save(); ctx.translate(Math.random()*8-4, Math.random()*8-4); shake--; }

        if (touchX !== null) {
            let centro = jogador.x + jogador.w / 2;
            let dist = touchX - centro;
            if (Math.abs(dist) > 5) jogador.x += (dist > 0 ? 1 : -1) * jogador.speed * dt;
        }
        
        if (jogador.x < 0) jogador.x = 0;
        if (jogador.x > canvas.width - jogador.w) jogador.x = canvas.width - jogador.w;

        if (score >= 1000 && !jogador.musculado) {
            transformando = true; shake = 50;
            setTimeout(() => {
                jogador.musculado = true; jogador.w = 90; jogador.h = 145; 
                jogador.y = canvas.height - 200; jogador.speed = 600;
                transformando = false;
            }, 1000);
        }

        const imgP = imagens[jogador.musculado ? 'boneco_musculado' : 'boneco_magro'];
        if (imgP.complete && imgP.naturalWidth > 0) ctx.drawImage(imgP, jogador.x, jogador.y, jogador.w, jogador.h);
        
        if (Math.random() < 0.04 && !transformando) obstaculos.push(new Obj());
        
        for (let i = obstaculos.length - 1; i >= 0; i--) {
            const o = obstaculos[i]; o.draw(dt);
            if (jogador.x + 10 < o.x + o.s - 10 && jogador.x + jogador.w - 10 > o.x + 10 && 
                jogador.y + 10 < o.y + o.s - 10 && jogador.y + jogador.h - 10 > o.y + 10) {
                if (o.bom) { score += 100; jogador.hp = Math.min(100, jogador.hp + 4); }
                else { jogador.hp -= 22; shake = 15; }
                document.getElementById("hp-bar").style.width = Math.max(0, jogador.hp) + "%";
                document.getElementById("score").innerText = score;
                obstaculos.splice(i, 1);
            } else if (o.y > canvas.height) { obstaculos.splice(i, 1); }
        }

        if (jogador.hp <= 0) {
            jogoIniciado = false; salvarRecorde(score); atualizarTabela();
            document.getElementById("final-score-txt").innerText = score + " PONTOS";
            gameOverScreen.style.display = "flex";
        }
        if (shake > 0) ctx.restore();
    }
    requestAnimationFrame(loop);
}
atualizarTabela();
requestAnimationFrame(loop);
</script>
</body>
</html>
