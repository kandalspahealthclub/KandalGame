<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kandal Gym: Evolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Anton', sans-serif; touch-action: none; }
        canvas { display: block; background: #fff; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 100; }
        .bar-bg { width: 180px; height: 20px; background: #333; border: 3px solid #000; }
        #hp-fill { width: 100%; height: 100%; background: #ff0000; transition: 0.2s; }
        #score-num { font-size: 50px; color: #000; margin-top: 5px; }
        #msg { position: absolute; width: 100%; top: 40%; text-align: center; font-size: 50px; color: #ffae00; display: none; text-shadow: 3px 3px 0 #000; z-index: 200; }
    </style>
</head>
<body>

<div id="msg">UPGRADE KANDAL!</div>
<div id="ui">
    <div class="bar-bg"><div id="hp-fill"></div></div>
    <div id="score-num">0</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const hpFill = document.getElementById("hp-fill");
const scoreNum = document.getElementById("score-num");
const msg = document.getElementById("msg");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CARREGAR IMAGENS COM "ANTI-CACHE" ---
const imgs = {};
const lista = ['boneco_magro', 'boneco_musculado', 'chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico', 'logo_kandal'];

lista.forEach(nome => {
    imgs[nome] = new Image();
    // O "?v=1" força o browser a descarregar a imagem de novo do GitHub
    imgs[nome].src = nome + '.png?v=1'; 
});

let jog = { x: canvas.width/2 - 45, y: canvas.height - 200, w: 90, h: 140, hp: 100, pts: 0, monster: false };
let itens = [];
let tX = null;
let anim = false;

window.ontouchstart = (e) => tX = e.touches[0].clientX;
window.ontouchmove = (e) => tX = e.touches[0].clientX;
window.ontouchend = () => tX = null;

function spawn() {
    const n = lista[Math.floor(Math.random() * (lista.length - 2)) + 2];
    itens.push({
        name: n,
        x: Math.random() * (canvas.width - 60),
        y: -60,
        s: 70,
        v: 4 + Math.random() * 4 + (jog.pts / 1000),
        bom: ['proteina', 'legumes', 'energetico'].includes(n)
    });
}

function update() {
    if (anim) return;

    if (tX !== null) {
        let c = jog.x + jog.w/2;
        if (tX < c - 10) jog.x -= 12;
        if (tX > c + 10) jog.x += 12;
    }
    if (jog.x < 0) jog.x = 0;
    if (jog.x + jog.w > canvas.width) jog.x = canvas.width - jog.w;

    // Transformação Dragon Ball aos 300 pontos
    if (jog.pts >= 300 && !jog.monster) {
        anim = true;
        msg.style.display = "block";
        setTimeout(() => {
            jog.monster = true;
            jog.w = 120; jog.h = 180;
            anim = false;
            msg.style.display = "none";
        }, 1200);
    }

    if (Math.random() < 0.03) spawn();

    for (let i = itens.length - 1; i >= 0; i--) {
        let o = itens[i];
        o.y += o.v;

        // Colisão
        if (jog.x < o.x + o.s - 15 && jog.x + jog.w > o.x + 15 && jog.y < o.y + o.s - 15 && jog.y + jog.h > o.y + 15) {
            if (o.bom) { jog.pts += 100; jog.hp = Math.min(100, jog.hp + 5); }
            else { jog.hp -= 20; }
            scoreNum.innerText = jog.pts;
            hpFill.style.width = jog.hp + "%";
            itens.splice(i, 1);
        } else if (o.y > canvas.height) {
            itens.splice(i, 1);
        }
    }

    if (jog.hp <= 0) location.reload();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Boneco
    let imgB = jog.monster ? imgs['boneco_musculado'] : imgs['boneco_magro'];
    if (imgB.complete && imgB.naturalWidth > 0) {
        ctx.drawImage(imgB, jog.x, jog.y, jog.w, jog.h);
    } else {
        // Bloco de reserva se a imagem falhar
        ctx.fillStyle = jog.monster ? "#000" : "#888";
        ctx.fillRect(jog.x, jog.y, jog.w, jog.h);
    }

    // Objetos
    itens.forEach(o => {
        let imgO = imgs[o.name];
        if (imgO.complete && imgO.naturalWidth > 0) {
            ctx.drawImage(imgO, o.x, o.y, o.s, o.s);
        } else {
            ctx.fillStyle = o.bom ? "green" : "red";
            ctx.fillRect(o.x, o.y, o.s, o.s);
        }
    });

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
