<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kandal Gym: Evolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; font-family: 'Anton', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 30px; left: 20px; z-index: 50; pointer-events: none; }
        .bar-outer { width: 200px; height: 25px; background: #222; border: 4px solid #000; }
        #hp-bar { width: 100%; height: 100%; background: #d00; transition: width 0.2s; }
        #score-display { font-size: 50px; color: #000; margin-top: 5px; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #restart-btn { background: #000; color: #fff; border: none; padding: 20px 40px; font-family: 'Anton'; font-size: 25px; margin-top: 20px; }
        #trans-msg { position: absolute; width: 100%; text-align: center; top: 40%; font-size: 60px; color: #ffae00; display: none; z-index: 60; text-shadow: 3px 3px 0 #000; }
    </style>
</head>
<body>

<div id="trans-msg">EVOLUÇÃO KANDAL!</div>
<div id="ui">
    <div class="bar-outer"><div id="hp-bar"></div></div>
    <div id="score-display">0</div>
</div>

<div id="game-over">
    <h2 style="font-size:50px; color:#d00;">FALHA MUSCULAR</h2>
    <p style="font-size:30px;">SCORE: <span id="final-score">0</span></p>
    <button id="restart-btn">RECOMEÇAR</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const hpBar = document.getElementById("hp-bar");
const scoreDisplay = document.getElementById("score-display");
const gameOverScreen = document.getElementById("game-over");
const transMsg = document.getElementById("trans-msg");
const restartBtn = document.getElementById("restart-btn");

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

const imagens = {};
const nomes = ['boneco', 'boneco_musculado', 'chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico', 'logo_kandal'];
nomes.forEach(n => { imagens[n] = new Image(); imagens[n].src = n + '.png'; });

let jogador, score, spawnTimer, obstaculos, touchX, gameActive, transformando;

function init() {
    jogador = { w: 80, h: 130, x: window.innerWidth / 2 - 40, y: window.innerHeight - 200, speed: 13, hp: 100, musculado: false };
    score = 0; spawnTimer = 0; obstaculos = []; touchX = null; gameActive = true; transformando = false;
    gameOverScreen.style.display = "none";
    transMsg.style.display = "none";
    hpBar.style.width = "100%";
}

window.ontouchstart = (e) => touchX = e.touches[0].clientX;
window.ontouchmove = (e) => touchX = e.touches[0].clientX;
window.ontouchend = () => touchX = null;

class Objeto {
    constructor() {
        const tipos = ['chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
        this.nome = tipos[Math.floor(Math.random() * tipos.length)];
        this.tipo = ['proteina', 'legumes', 'energetico'].includes(this.nome) ? 'bom' : 'mau';
        this.size = 70;
        this.x = Math.random() * (window.innerWidth - this.size);
        this.y = -this.size;
        this.vel = 5 + Math.random() * 5 + (score / 1500);
    }
    update() { if(!transformando) this.y += this.vel; }
    draw() {
        const img = imagens[this.nome];
        if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, this.x, this.y, this.size, this.size);
        } else {
            ctx.fillStyle = this.tipo === 'bom' ? '#22c55e' : '#ef4444';
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }
}

function update() {
    if (!gameActive || transformando) return;
    if (touchX !== null) {
        let centro = jogador.x + jogador.w / 2;
        if (touchX < centro - 15) jogador.x -= jogador.speed;
        else if (touchX > centro + 15) jogador.x += jogador.speed;
    }
    if (jogador.x < 0) jogador.x = 0;
    if (jogador.x + jogador.w > window.innerWidth) jogador.x = window.innerWidth - jogador.w;

    if (score >= 500 && !jogador.musculado) {
        transformando = true;
        transMsg.style.display = "block";
        setTimeout(() => {
            jogador.musculado = true;
            jogador.w = 120; jogador.h = 180; jogador.speed = 16;
            transformando = false;
            transMsg.style.display = "none";
        }, 1200);
    }

    spawnTimer++;
    if (spawnTimer > 35) { obstaculos.push(new Objeto()); spawnTimer = 0; }

    for (let i = obstaculos.length - 1; i >= 0; i--) {
        const o = obstaculos[i]; o.update();
        if (jogador.x < o.x + o.size && jogador.x + jogador.w > o.x && jogador.y < o.y + o.size && jogador.y + jogador.h > o.y) {
            if (o.tipo === 'bom') { score += 100; jogador.hp = Math.min(100, jogador.hp + 5); }
            else { jogador.hp -= 20; }
            hpBar.style.width = jogador.hp + "%";
            obstaculos.splice(i, 1);
        } else if (o.y > window.innerHeight) { obstaculos.splice(i, 1); }
    }
    if (jogador.hp <= 0) { gameActive = false; document.getElementById("final-score").innerText = score; gameOverScreen.style.display = "flex"; }
    scoreDisplay.innerText = score;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Marca de água
    if (imagens['logo_kandal'].complete) {
        ctx.globalAlpha = 0.05;
        ctx.drawImage(imagens['logo_kandal'], window.innerWidth/2-100, window.innerHeight/2-100, 200, 200);
        ctx.globalAlpha = 1;
    }

    const imgP = jogador.musculado ? imagens['boneco_musculado'] : imagens['boneco'];
    if (imgP && imgP.complete && imgP.naturalWidth > 0) {
        ctx.drawImage(imgP, jogador.x, jogador.y, jogador.w, jogador.h);
    } else {
        ctx.fillStyle = jogador.musculado ? "#000" : "#777";
        ctx.fillRect(jogador.x, jogador.y, jogador.w, jogador.h);
    }
    obstaculos.forEach(o => o.draw());
    requestAnimationFrame(() => { update(); draw(); });
}

restartBtn.onclick = () => init();
init();
draw();
</script>
</body>
</html>
