<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kandal Gym: Legend Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: 'Inter', sans-serif; touch-action: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; color: #fff; }
        .btn-kandal { background: #fff; color: #000; border: none; border-radius: 8px; padding: 16px 40px; font-size: 20px; cursor: pointer; font-family: 'Anton'; text-transform: uppercase; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 50; display: none; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .bar-outer { width: 160px; height: 10px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff416c, #ff4b2b); transition: width 0.3s; }
        #score { font-family: 'Anton'; font-size: 40px; color: #111; }
        #evo-msg { position: absolute; width: 100%; top: 30%; text-align: center; font-family: 'Anton'; font-size: 45px; color: #ffae00; display: none; z-index: 100; text-shadow: 2px 2px #000; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 110; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="font-family:'Anton'; font-size:50px; margin-bottom:10px; color:#ff416c;">KANDAL GYM</h1>
    <button class="btn-kandal" onclick="iniciarJogo()">TREINAR</button>
</div>

<div id="ui">
    <div style="font-size:10px; font-weight:800; color:#666; text-transform:uppercase;">Energia Muscular</div>
    <div class="bar-outer"><div id="hp-bar"></div></div>
    <div id="score">0</div>
</div>

<div id="evo-msg">EVOLUÇÃO!</div>

<div id="game-over">
    <h2 style="font-family:'Anton'; font-size:50px; color:#d00;">OVERTRAINING</h2>
    <p id="final-score-txt" style="font-size:24px; font-weight:bold;">0 PTS</p>
    <button class="btn-kandal" style="background:#000; color:#fff;" onclick="iniciarJogo()">TENTAR DE NOVO</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startScreen = document.getElementById("start-screen");
const ui = document.getElementById("ui");
const gameOverScreen = document.getElementById("game-over");
const evoMsg = document.getElementById("evo-msg");

let jogoIniciado = false;
let jogador, score, obstaculos, touchX, transformando, shake = 0, lastTime = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// --- CARREGAMENTO DE IMAGENS ---
const imagens = {};
const nomes = ['boneco_magro', 'boneco_musculado', 'cbum', 'ronnie', 'arnaldo', 'chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];

nomes.forEach(n => {
    imagens[n] = new Image();
    imagens[n].src = n + '.png';
    imagens[n].onload = () => console.log("Carregado: " + n);
    imagens[n].onerror = () => console.warn("Erro: Certifica-te que " + n + ".png está na pasta.");
});

function iniciarJogo() {
    jogador = { w: 70, h: 110, x: canvas.width/2 - 35, y: canvas.height-160, speed: 500, hp: 100, nivel: 'boneco_magro' };
    score = 0; obstaculos = []; touchX = null; transformando = false; jogoIniciado = true;
    lastTime = performance.now();
    document.getElementById("hp-bar").style.width = "100%";
    document.getElementById("score").innerText = "0";
    startScreen.style.display = "none";
    gameOverScreen.style.display = "none";
    ui.style.display = "block";
}

window.ontouchstart = (e) => touchX = e.touches[0].clientX;
window.ontouchmove = (e) => touchX = e.touches[0].clientX;
window.ontouchend = () => touchX = null;

class Obj {
    constructor() {
        const tipos = ['chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
        this.n = tipos[Math.floor(Math.random() * tipos.length)];
        this.bom = ['proteina', 'legumes', 'energetico'].includes(this.n);
        this.s = 60;
        this.x = Math.random() * (canvas.width - this.s);
        this.y = -this.s;
        this.v = (300 + (score / 5)); 
    }
    draw(dt) {
        const img = imagens[this.n];
        if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, this.x, this.y, this.s, this.s);
        } else {
            ctx.fillStyle = this.bom ? "#4CAF50" : "#F44336";
            ctx.fillRect(this.x, this.y, this.s, this.s);
        }
        if (!transformando) this.y += this.v * dt;
    }
}

function dispararEvolucao(texto, novoNivel, novaVel) {
    transformando = true;
    shake = 40;
    evoMsg.innerText = texto;
    evoMsg.style.display = "block";
    setTimeout(() => {
        jogador.nivel = novoNivel;
        jogador.speed = novaVel;
        jogador.w = 100; // Bonecos evoluídos são maiores
        jogador.h = 160;
        jogador.y = canvas.height - 210;
        transformando = false;
        evoMsg.style.display = "none";
    }, 1200);
}

function loop(currentTime) {
    const dt = (currentTime - lastTime) / 1000;
    lastTime = currentTime;

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (jogoIniciado) {
        if (shake > 0) { ctx.save(); ctx.translate(Math.random()*10-5, Math.random()*10-5); shake--; }

        if (touchX !== null) {
            let centro = jogador.x + jogador.w/2;
            if (Math.abs(touchX - centro) > 5) jogador.x += (touchX > centro ? 1 : -1) * jogador.speed * dt;
        }

        // LÓGICA DE NÍVEIS BLINDADA
        if (score >= 1000 && score < 2000 && jogador.nivel === 'boneco_magro') dispararEvolucao("MONSTRO KANDAL!", "boneco_musculado", 550);
        else if (score >= 2000 && score < 4000 && jogador.nivel === 'boneco_musculado') dispararEvolucao("CBUM ATIVADO!", "cbum", 600);
        else if (score >= 4000 && score < 6000 && jogador.nivel === 'cbum') dispararEvolucao("YEAH BUDDY!", "ronnie", 650);
        else if (score >= 6000 && jogador.nivel === 'ronnie') dispararEvolucao("ARNOLD!", "arnaldo", 700);

        // DESENHO DO JOGADOR COM FALLBACK
        const imgP = imagens[jogador.nivel];
        if (imgP && imgP.complete && imgP.naturalWidth > 0) {
            ctx.drawImage(imgP, jogador.x, jogador.y, jogador.w, jogador.h);
        } else {
            // Se a imagem falhar, desenha um vulto para o jogo não desaparecer
            ctx.fillStyle = "#333";
            ctx.fillRect(jogador.x, jogador.y, jogador.w, jogador.h);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 14px Inter";
            ctx.fillText(jogador.nivel.toUpperCase(), jogador.x + 5, jogador.y + 30);
        }

        if (Math.random() < 0.03 && !transformando) obstaculos.push(new Obj());

        for (let i = obstaculos.length - 1; i >= 0; i--) {
            const o = obstaculos[i]; o.draw(dt);
            if (jogador.x < o.x + o.s && jogador.x + jogador.w > o.x && jogador.y < o.y + o.s && jogador.y + jogador.h > o.y) {
                if (o.bom) { score += 100; jogador.hp = Math.min(100, jogador.hp + 5); }
                else { jogador.hp -= 20; shake = 15; }
                document.getElementById("hp-bar").style.width = jogador.hp + "%";
                document.getElementById("score").innerText = score;
                obstaculos.splice(i, 1);
            } else if (o.y > canvas.height) { obstaculos.splice(i, 1); }
        }

        if (jogador.hp <= 0) {
            jogoIniciado = false;
            document.getElementById("final-score-txt").innerText = score + " PTS";
            gameOverScreen.style.display = "flex";
        }
        if (shake > 0) ctx.restore();
    }
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
