<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kandal Gym: Legends</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    
    <link rel="icon" type="image/png" sizes="192x192" href="icon_kandal.png">
    <link rel="apple-touch-icon" href="icon_kandal.png">

    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Inter', sans-serif; touch-action: none; 
        }
        
        /* MENU INICIAL */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; color: #fff;
        }
        #menu-logo { width: 180px; margin-bottom: 10px; filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.5)); }

        #rules-box {
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 15px;
            padding: 12px; margin-bottom: 20px; width: 280px; font-size: 13px;
        }
        #rules-box h4 { margin: 0 0 8px 0; font-family: 'Anton'; color: #ff416c; text-transform: uppercase; }
        
        .btn-kandal {
            background: #fff; color: #000; border: none; border-radius: 10px;
            padding: 18px 45px; font-size: 22px; cursor: pointer; text-transform: uppercase;
            font-family: 'Anton'; width: 270px; margin-bottom: 15px; transition: 0.2s;
        }
        .btn-kandal:active { transform: scale(0.95); }

        #high-scores {
            width: 270px; background: rgba(0, 0, 0, 0.4); border-radius: 12px;
            padding: 10px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #high-scores h3 { margin: 0 0 10px 0; font-family: 'Anton'; font-size: 18px; text-align: center; color: #fff; }
        .score-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }

        /* INTERFACE DO JOGO */
        #ui { 
            position: absolute; top: 40px; left: 20px; z-index: 50; display: none; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .bar-outer { width: 150px; height: 10px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 5px 0; }
        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff416c, #ff4b2b); transition: width 0.3s; }
        #score { font-family: 'Anton'; font-size: 45px; color: #111; line-height: 1; }

        #evo-msg { position: absolute; width: 100%; top: 35%; text-align: center; font-family: 'Anton'; font-size: 45px; color: #ffae00; text-shadow: 3px 3px 0 #000; display: none; z-index: 100; pointer-events: none; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 110; }
        
        canvas { display: block; background: #fff; }
    </style>
</head>
<body>

<div id="start-screen">
    <img src="logo_kandal.png" id="menu-logo">
    
    <div id="rules-box">
        <h4>Evoluções:</h4>
        <ul style="padding-left:18px; margin:0; color:#ccc; list-style: square;">
            <li>1000: Monstro Kandal</li>
            <li>2000: CBUM</li>
            <li>4000: Ronnie Coleman</li>
            <li>6000: Arnold Schwarzenegger</li>
        </ul>
    </div>

    <button class="btn-kandal" onclick="iniciarJogo()">TREINAR AGORA</button>
    
    <div id="high-scores">
        <h3>MELHORES TREINOS</h3>
        <div id="scores-list"></div>
    </div>
</div>

<div id="ui">
    <div style="font-size:10px; font-weight:900; color:#555; text-transform:uppercase;">Energia Muscular</div>
    <div class="bar-outer"><div id="hp-bar"></div></div>
    <div id="score">0</div>
</div>

<div id="evo-msg">EVOLUÇÃO!</div>

<div id="game-over">
    <h2 style="font-family:'Anton'; font-size:50px; color:#d00; margin:0;">FALHA TOTAL</h2>
    <p id="final-score-txt" style="font-size:24px; margin: 15px 0; font-weight:800;">0 PTS</p>
    <button class="btn-kandal" style="background:#000; color:#fff;" onclick="iniciarJogo()">REPETIR</button>
    <button class="btn-kandal" style="background:#fff; color:#000; border:2px solid #000; margin-top:5px;" onclick="voltarAoMenu()">MENU</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startScreen = document.getElementById("start-screen");
const ui = document.getElementById("ui");
const gameOverScreen = document.getElementById("game-over");
const evoMsg = document.getElementById("evo-msg");

let jogoIniciado = false;
let jogador, score, obstaculos, touchX, transformando, shake = 0, lastTime = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// --- CARREGAMENTO DE IMAGENS ---
const imagens = {};
const comida = ['chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
const herois = ['boneco_magro', 'boneco_musculado', 'cbum', 'ronnie', 'arnaldo'];

comida.forEach(n => { imagens[n] = new Image(); imagens[n].src = n + '.png'; });
herois.forEach(n => {
    imagens[n] = new Image();
    imagens[n].src = n + '.png';
    // Fallback inteligente para evitar erros se a imagem não carregar
    imagens[n].onerror = function() { if(!this.src.includes('.jpg')) this.src = n + '.jpg'; };
});

function atualizarTabela() {
    let r = JSON.parse(localStorage.getItem('kandal_top')) || [0, 0, 0];
    document.getElementById("scores-list").innerHTML = r.map((s, i) => `
        <div class="score-row"><span>${i+1}º Lugar</span> <b style="color:#ffae00;">${s} pts</b></div>
    `).join('');
}

function salvarRecorde(s) {
    let r = JSON.parse(localStorage.getItem('kandal_top')) || [0, 0, 0];
    r.push(s); r.sort((a,b) => b-a);
    localStorage.setItem('kandal_top', JSON.stringify(r.slice(0, 3)));
}

function iniciarJogo() {
    jogador = { w: 75, h: 115, x: canvas.width/2 - 37, y: canvas.height-170, speed: 520, hp: 100, nivel: 'boneco_magro' };
    score = 0; obstaculos = []; touchX = null; transformando = false; jogoIniciado = true;
    lastTime = performance.now();
    document.getElementById("hp-bar").style.width = "100%";
    document.getElementById("score").innerText = "0";
    startScreen.style.display = "none";
    gameOverScreen.style.display = "none";
    ui.style.display = "block";
}

function voltarAoMenu() {
    jogoIniciado = false;
    gameOverScreen.style.display = "none";
    ui.style.display = "none";
    startScreen.style.display = "flex";
    atualizarTabela();
}

// Controlos táteis
window.ontouchstart = (e) => touchX = e.touches[0].clientX;
window.ontouchmove = (e) => touchX = e.touches[0].clientX;
window.ontouchend = () => touchX = null;

class Obj {
    constructor() {
        this.n = comida[Math.floor(Math.random() * comida.length)];
        this.bom = ['proteina', 'legumes', 'energetico'].includes(this.n);
        this.s = 65;
        this.x = Math.random() * (canvas.width - this.s);
        this.y = -this.s;
        this.v = (320 + (score / 4)); 
    }
    draw(dt) {
        const img = imagens[this.n];
        if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, this.x, this.y, this.s, this.s);
        else { ctx.fillStyle = this.bom ? "green" : "red"; ctx.fillRect(this.x, this.y, this.s, this.s); }
        if (!transformando) this.y += this.v * dt;
    }
}

function dispararEvolucao(msg, nivel, vel) {
    transformando = true; shake = 80;
    evoMsg.innerText = msg; evoMsg.style.display = "block";
    canvas.style.filter = "brightness(2) contrast(1.5)"; 
    setTimeout(() => {
        jogador.nivel = nivel;
        jogador.w = 110; jogador.h = 175;
        jogador.y = canvas.height - 230;
        jogador.speed = vel;
        transformando = false; evoMsg.style.display = "none";
        canvas.style.filter = "none";
    }, 1200);
}

function loop(currentTime) {
    const dt = (currentTime - lastTime) / 1000;
    lastTime = currentTime;
    ctx.clearRect(0, 0, canvas.width, canvas.height); 
    
    // Grelha de fundo para sensação de profundidade
    ctx.strokeStyle = "rgba(0,0,0,0.03)";
    for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }

    if (jogoIniciado) {
        if (shake > 0) { ctx.save(); ctx.translate(Math.random()*10-5, Math.random()*10-5); shake--; }
        
        if (touchX !== null) {
            let centro = jogador.x + jogador.w / 2;
            let dist = touchX - centro;
            if (Math.abs(dist) > 5) jogador.x += (dist > 0 ? 1 : -1) * jogador.speed * dt;
        }
        if (jogador.x < 0) jogador.x = 0;
        if (jogador.x > canvas.width - jogador.w) jogador.x = canvas.width - jogador.w;

        // SISTEMA DE NÍVEIS
        if (score >= 1000 && score < 2000 && jogador.nivel === 'boneco_magro') dispararEvolucao("MONSTRO KANDAL!", "boneco_musculado", 560);
        else if (score >= 2000 && score < 4000 && jogador.nivel === 'boneco_musculado') dispararEvolucao("CBUM ATIVADO!", "cbum", 620);
        else if (score >= 4000 && score < 6000 && jogador.nivel === 'cbum') dispararEvolucao("YEAH BUDDY!", "ronnie", 670);
        else if (score >= 6000 && jogador.nivel === 'ronnie') dispararEvolucao("THE OAK!", "arnaldo", 730);

        const imgP = imagens[jogador.nivel];
        if (imgP && imgP.complete && imgP.naturalWidth > 0) {
            ctx.drawImage(imgP, jogador.x, jogador.y, jogador.w, jogador.h);
        } else {
            ctx.fillStyle = "#222"; ctx.fillRect(jogador.x, jogador.y, jogador.w, jogador.h);
        }
        
        if (Math.random() < 0.04 && !transformando) obstaculos.push(new Obj());
        
        for (let i = obstaculos.length - 1; i >= 0; i--) {
            const o = obstaculos[i]; o.draw(dt);
            if (jogador.x + 10 < o.x + o.s - 10 && jogador.x + jogador.w - 10 > o.x + 10 && 
                jogador.y + 10 < o.y + o.s - 10 && jogador.y + jogador.h - 10 > o.y + 10) {
                if (o.bom) { score += 100; jogador.hp = Math.min(100, jogador.hp + 5); }
                else { jogador.hp -= 22; shake = 15; }
                document.getElementById("hp-bar").style.width = Math.max(0, jogador.hp) + "%";
                document.getElementById("score").innerText = score;
                obstaculos.splice(i, 1);
            } else if (o.y > canvas.height) { obstaculos.splice(i, 1); }
        }
        if (jogador.hp <= 0) {
            jogoIniciado = false; salvarRecorde(score);
            document.getElementById("final-score-txt").innerText = score + " PONTOS";
            gameOverScreen.style.display = "flex";
        }
        if (shake > 0) ctx.restore();
    }
    requestAnimationFrame(loop);
}
atualizarTabela();
requestAnimationFrame(loop);
</script>
</body>
</html>
