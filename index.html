<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kandal Gym: Evolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: 'Anton', sans-serif; }
        
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 999;
        }

        .btn-kandal {
            background: #000; color: #fff; border: none; padding: 25px 60px;
            font-size: 30px; cursor: pointer; text-transform: uppercase;
            box-shadow: 6px 6px 0px #d00; z-index: 1000; margin-bottom: 30px;
        }

        /* Estilo da Tabela de Recordes */
        #high-scores {
            width: 250px; background: #f4f4f4; border: 3px solid #000;
            padding: 15px; text-align: center; box-shadow: 4px 4px 0px #ddd;
        }
        #high-scores h3 { margin: 0 0 10px 0; color: #d00; text-transform: uppercase; border-bottom: 2px solid #000; }
        .score-row { display: flex; justify-content: space-between; font-size: 20px; border-bottom: 1px dashed #ccc; padding: 5px 0; }
        .score-row:last-child { border: none; }

        #ui { position: absolute; top: 30px; left: 20px; z-index: 50; display: none; pointer-events: none; }
        .bar-outer { width: 180px; height: 20px; background: #222; border: 4px solid #000; }
        #hp-bar { width: 100%; height: 100%; background: #d00; transition: width 0.2s; }
        #score { font-size: 50px; color: #000; margin-top: 5px; }

        #trans-msg {
            position: absolute; width: 100%; top: 40%; text-align: center;
            font-size: 50px; color: #ffae00; text-shadow: 3px 3px 0px #000; display: none; z-index: 60;
        }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        
        canvas { display: block; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="font-size: 50px; margin-bottom: 10px; color: #000;">KANDAL GYM</h1>
    <button class="btn-kandal" onclick="iniciarJogo()">INICIAR TREINO</button>
    
    <div id="high-scores">
        <h3>Recordes</h3>
        <div id="scores-list">
            </div>
    </div>
</div>

<div id="ui">
    <div class="bar-outer"><div id="hp-bar"></div></div>
    <div id="score">0</div>
</div>

<div id="trans-msg">EVOLUÇÃO KANDAL!</div>

<div id="game-over">
    <h2 style="font-size:50px; color:#d00; margin:0;">FALHA MUSCULAR</h2>
    <p style="font-size:30px; margin:10px 0;">PONTOS: <span id="final-score">0</span></p>
    <button class="btn-kandal" onclick="iniciarJogo()">RECOMEÇAR</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startScreen = document.getElementById("start-screen");
const ui = document.getElementById("ui");
const gameOverScreen = document.getElementById("game-over");
const scoresList = document.getElementById("scores-list");

let jogoIniciado = false;
let jogador, score, obstaculos, touchX, transformando, shake = 0;

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

const imagens = {};
const nomes = ['boneco_magro', 'boneco_musculado', 'chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
nomes.forEach(n => {
    imagens[n] = new Image();
    imagens[n].src = n + '.png?v=8';
});

// --- SISTEMA DE RECORDES ---
function atualizarTabelaRecordes() {
    let records = JSON.parse(localStorage.getItem('kandal_top_scores')) || [0, 0, 0];
    scoresList.innerHTML = records.map((s, i) => `
        <div class="score-row">
            <span>${i+1}º LUGAR</span>
            <span>${s} pts</span>
        </div>
    `).join('');
}

function salvarRecorde(novoScore) {
    let records = JSON.parse(localStorage.getItem('kandal_top_scores')) || [0, 0, 0];
    records.push(novoScore);
    records.sort((a, b) => b - a); // Ordenar do maior para o menor
    records = records.slice(0, 3); // Ficar só com os top 3
    localStorage.setItem('kandal_top_scores', JSON.stringify(records));
}

function iniciarJogo() {
    jogador = { w: 70, h: 110, x: canvas.width/2 - 35, y: canvas.height-170, speed: 13, hp: 100, musculado: false };
    score = 0; obstaculos = []; touchX = null; transformando = false; jogoIniciado = true;
    document.getElementById("hp-bar").style.width = "100%";
    document.getElementById("score").innerText = "0";
    startScreen.style.display = "none";
    gameOverScreen.style.display = "none";
    ui.style.display = "block";
    document.getElementById("trans-msg").style.display = "none";
}

window.ontouchstart = (e) => touchX = e.touches[0].clientX;
window.ontouchmove = (e) => touchX = e.touches[0].clientX;
window.ontouchend = () => touchX = null;

class Obj {
    constructor() {
        const tipos = ['chocolate', 'gelado', 'hamburguer', 'cachorro', 'francesinha', 'proteina', 'legumes', 'energetico'];
        this.n = tipos[Math.floor(Math.random() * tipos.length)];
        this.bom = ['proteina', 'legumes', 'energetico'].includes(this.n);
        this.s = 55;
        this.x = Math.random() * (canvas.width - this.s);
        this.y = -this.s;
        this.v = 5 + Math.random() * 4 + (score / 1500);
    }
    draw() {
        const img = imagens[this.n];
        if (img.complete && img.naturalWidth > 0) ctx.drawImage(img, this.x, this.y, this.s, this.s);
        else { ctx.fillStyle = this.bom ? "green" : "red"; ctx.fillRect(this.x, this.y, this.s, this.s); }
        if (!transformando) this.y += this.v;
    }
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (jogoIniciado) {
        if (shake > 0) { ctx.save(); ctx.translate(Math.random()*8-4, Math.random()*8-4); shake--; }
        if (touchX !== null) {
            let centro = jogador.x + jogador.w / 2;
            if (touchX < centro - 10) jogador.x -= jogador.speed;
            if (touchX > centro + 10) jogador.x += jogador.speed;
        }
        if (score >= 1000 && !jogador.musculado) {
            transformando = true;
            document.getElementById("trans-msg").style.display = "block";
            shake = 50;
            setTimeout(() => {
                jogador.musculado = true; jogador.w = 110; jogador.h = 165;
                jogador.y = canvas.height - 225; jogador.speed = 17;
                transformando = false; document.getElementById("trans-msg").style.display = "none";
            }, 1500);
        }
        const imgP = imagens[jogador.musculado ? 'boneco_musculado' : 'boneco_magro'];
        if (imgP.complete && imgP.naturalWidth > 0) ctx.drawImage(imgP, jogador.x, jogador.y, jogador.w, jogador.h);
        else { ctx.fillStyle = "#000"; ctx.fillRect(jogador.x, jogador.y, jogador.w, jogador.h); }

        if (Math.random() < 0.03 && !transformando) obstaculos.push(new Obj());
        for (let i = obstaculos.length - 1; i >= 0; i--) {
            const o = obstaculos[i]; o.draw();
            if (jogador.x < o.x + o.s && jogador.x + jogador.w > o.x && jogador.y < o.y + o.s && jogador.y + jogador.h > o.y) {
                if (o.bom) { score += 100; jogador.hp = Math.min(100, jogador.hp + 5); }
                else { jogador.hp -= 20; shake = 10; }
                document.getElementById("hp-bar").style.width = jogador.hp + "%";
                document.getElementById("score").innerText = score;
                obstaculos.splice(i, 1);
            } else if (o.y > canvas.height) { obstaculos.splice(i, 1); }
        }
        if (jogador.hp <= 0) {
            jogoIniciado = false;
            salvarRecorde(score);
            atualizarTabelaRecordes();
            document.getElementById("final-score").innerText = score;
            gameOverScreen.style.display = "flex";
        }
        if (shake > 0) ctx.restore();
    }
    requestAnimationFrame(loop);
}

// Inicializar a tabela ao carregar a página
atualizarTabelaRecordes();
loop();
</script>
</body>
</html>
